<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llmesh &mdash; Setup</title>
  <link rel="stylesheet" href="{{asset "admin.css"}}">
  <script>(function(){var t;try{t=localStorage.getItem('llmesh-theme');}catch(e){}if(!t&&window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches)t='light';if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body class="auth-body">
<div class="auth-card">
  <div class="brand">llmesh</div>
  <h1>First-run setup &mdash; create the initial admin account</h1>
  {{if .Error}}<div class="form-error">{{.Error}}</div>{{end}}
  <form method="POST" action="/portal/setup">
    <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label for="confirm">Confirm password</label>
      <input id="confirm" name="confirm" type="password" autocomplete="new-password">
    </div>
    <button type="submit">Create account</button>
  </form>
</div>
</body>
</html>
