services:
  llmesh-router:
    build:
      context: .
      dockerfile: router/Dockerfile
    image: llmesh-router
    command: ["-state", "/data/state.db"]
    ports:
      - "53002:53002"
    volumes:
      - ./router/config.yaml:/config.yaml:ro,z
      # State is an embedded SQLite database; a legacy state.json in this dir is migrated automatically.
      - ./router/data:/data:z
    restart: unless-stopped
