services:
  llmesh-shim:
    build:
      context: .
      dockerfile: shim/Dockerfile
    image: llmesh-shim
    volumes:
      - ./shim/config.yaml:/config.yaml:ro
    # Inject API keys from the host environment. Add any keys your backends use.
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
